<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莲池竞渡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background:
                linear-gradient(175deg, #e8dfd2 0%, #f2ece3 20%, #f7f3eb 50%, #ede4d6 80%, #dfd4c0 100%);
            color: #3d3228;
            font-family: KaiTi, STKaiti, FangSong, STFangsong, "Noto Serif SC", serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas { display: block; margin: 0 auto; }

        #game-container {
            position: relative;
            width: 1100px;
            height: 700px;
            margin: 0 auto;
        }

        /* ---- 通用按钮 ---- */
        button, .btn {
            font-family: KaiTi, STKaiti, "Microsoft YaHei", sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: transform 0.18s cubic-bezier(.34,1.56,.64,1),
                        box-shadow 0.18s ease,
                        background 0.18s ease,
                        filter 0.18s ease;
            outline: none;
        }
        button:hover, .btn:hover {
            transform: translateY(-1px) scale(1.04);
            filter: brightness(1.08);
        }
        button:active, .btn:active {
            transform: translateY(1px) scale(0.97);
            filter: brightness(0.95);
        }
        button:disabled, .btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            filter: grayscale(0.4);
        }
        button:disabled:hover, .btn:disabled:hover {
            transform: none;
            filter: grayscale(0.4);
        }

        /* ---- 印章按钮 ---- */
        .seal-btn {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(180deg, #c84848 0%, #b03838 100%);
            color: #fdf5f0;
            border: 1px solid rgba(139, 48, 48, 0.5);
            border-radius: 3px;
            font-family: KaiTi, STKaiti, serif;
            font-size: 18px;
            font-weight: bold;
            box-shadow:
                0 1px 2px rgba(61, 50, 40, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.18s cubic-bezier(.34,1.56,.64,1),
                        box-shadow 0.18s ease,
                        filter 0.18s ease;
        }
        .seal-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow:
                0 3px 6px rgba(61, 50, 40, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            filter: brightness(1.08);
        }
        .seal-btn:active {
            transform: translateY(1px) scale(0.97);
            filter: brightness(0.94);
        }
        .seal-btn.secondary {
            background: linear-gradient(180deg, #638aa0 0%, #4d7085 100%);
            border-color: rgba(61, 93, 112, 0.5);
        }
        .seal-btn.small {
            padding: 4px 12px;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Canvas will be created by main.js -->

        <!-- Engine (do not modify) -->
        <script src="store/store.js"></script>

        <!-- Config -->
        <script src="config/units.js"></script>
        <script src="config/balance.js"></script>
        <script src="config/strings.js"></script>

        <!-- Systems -->
        <script src="systems/raceSystem.js"></script>
        <script src="systems/roundSystem.js"></script>
        <script src="systems/playerSystem.js"></script>
        <script src="systems/betSystem.js"></script>
        <script src="systems/pouchSystem.js"></script>
        <script src="systems/logSystem.js"></script>
        <script src="systems/aiSystem.js"></script>

        <!-- UI -->
        <script src="ui/startScreen.js"></script>
        <script src="ui/trackRenderer.js"></script>
        <script src="ui/turtleRenderer.js"></script>
        <script src="ui/actionPanel.js"></script>
        <script src="ui/playerBar.js"></script>
        <script src="ui/roundInfo.js"></script>
        <script src="ui/settlementOverlay.js"></script>
        <script src="ui/historyLog.js"></script>
        <script src="ui/unactedPanel.js"></script>

        <!-- Entry point (must be last) -->
        <script src="main.js"></script>
    </div>
</body>
</html>
